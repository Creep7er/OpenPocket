name: Bug report
description: Report a reproducible OpenPocket problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: OpenPocket version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Device and operating system
      placeholder: "Example: Pixel 6a, Android 15"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Select...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove personal data, paths, and credentials before posting.
