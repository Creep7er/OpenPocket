name: Feature request
description: Propose a focused PopugVPocket improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user or developer problem, not only a solution.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Runtime, Shell UI, Cartridge, SDK, Android, Documentation]
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and scope
