name: Release Android

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from config/product.json
        required: true
        default: 0.5.1
      mode:
        description: Signing mode
        required: true
        type: choice
        options:
          - debug-prerelease
          - production
      prerelease:
        description: Mark release as prerelease
        required: true
        type: boolean
        default: true
      draft:
        description: Create a draft GitHub Release
        required: true
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    env:
      GODOT_VERSION: 4.7-stable
      GODOT_BIN: /tmp/popugvpocket-godot/Godot_v4.7-stable_linux.x86_64
      ANDROID_HOME: /tmp/popugvpocket-android-sdk
      ANDROID_SDK_ROOT: /tmp/popugvpocket-android-sdk
      XDG_CONFIG_HOME: /tmp/popugvpocket-godot-config
      GODOT_ANDROID_KEYSTORE_DEBUG_PATH: /tmp/popugvpocket-debug.keystore
      GODOT_ANDROID_KEYSTORE_DEBUG_USER: androiddebugkey
      GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Resolve release settings
        id: release
        shell: bash
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            mode="debug-prerelease"
            draft="false"
            prerelease="true"
          else
            version="${{ inputs.version }}"
            mode="${{ inputs.mode }}"
            draft="${{ inputs.draft }}"
            prerelease="${{ inputs.prerelease }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
      - name: Validate version
        run: |
          python tools/validate_version.py
          python -c "import json; from pathlib import Path; actual=json.loads(Path('config/product.json').read_text())['version']; expected='${{ steps.release.outputs.version }}'; raise SystemExit(0 if actual == expected else f'version mismatch: {actual} != {expected}')"
      - name: Validate production signing secrets
        if: steps.release.outputs.mode == 'production'
        env:
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          test -n "$KEYSTORE" || { echo "ANDROID_KEYSTORE_BASE64 is required for production"; exit 1; }
          test -n "$STORE_PASSWORD" || { echo "ANDROID_KEYSTORE_PASSWORD is required for production"; exit 1; }
          test -n "$KEY_ALIAS" || { echo "ANDROID_KEY_ALIAS is required for production"; exit 1; }
          echo "$KEYSTORE" | base64 --decode > "$RUNNER_TEMP/popugvpocket.keystore"
          python tools/configure_android_signing.py --keystore "$RUNNER_TEMP/popugvpocket.keystore" --alias "$KEY_ALIAS" --password "$STORE_PASSWORD"
      - name: Install Android SDK
        run: |
          mkdir -p "$ANDROID_HOME/cmdline-tools"
          curl --fail --location --output cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
          mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-35" "platforms;android-36" "build-tools;35.0.1" "cmake;3.10.2.4988404" "ndk;28.1.13356709"
          keytool -genkeypair -v -keystore "$GODOT_ANDROID_KEYSTORE_DEBUG_PATH" -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
      - name: Install Godot and templates
        run: |
          mkdir -p /tmp/popugvpocket-godot
          curl --fail --location --output /tmp/popugvpocket-godot/godot.zip "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q /tmp/popugvpocket-godot/godot.zip -d /tmp/popugvpocket-godot
          chmod +x "$GODOT_BIN"
          curl --fail --location --output /tmp/popugvpocket-godot/templates.tpz "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}"
          unzip -q /tmp/popugvpocket-godot/templates.tpz -d /tmp/popugvpocket-template-extract
          cp -R /tmp/popugvpocket-template-extract/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}/"
          python tools/configure_ci_android.py
          mkdir -p android/build
          unzip -q "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}/android_source.zip" -d android/build
          touch android/build/.gdignore
          chmod +x android/build/gradlew
          test -f android/build/build.gradle
      - name: Essential checks
        run: |
          python tools/validate_project.py
          python tools/test_install_flow.py
          "$GODOT_BIN" --headless --editor --path . --quit
          "$GODOT_BIN" --headless --path . res://tools/smoke_runner.tscn
          "$GODOT_BIN" --headless --path . res://tools/vgirl_layout_audit.tscn
      - name: Build Android artifacts
        shell: bash
        run: |
          run_godot_export() {
            set +e
            "$@" 2>&1 | tee export.log
            status=${PIPESTATUS[0]}
            set -e
            if [[ $status -ne 0 ]]; then
              {
                echo "### Android export failure"
                echo '```text'
                tail -n 100 export.log
                echo '```'
              } >> "$GITHUB_STEP_SUMMARY"
              tail -n 100 export.log | python -c "import sys; text=sys.stdin.read()[-6000:].replace('%','%25').replace(chr(13),'%0D').replace(chr(10),'%0A'); print(f'::error title=Android export failed::{text}')"
              return "$status"
            fi
          }
          version="${{ steps.release.outputs.version }}"
          mkdir -p exports/android
          if [[ "${{ steps.release.outputs.mode }}" == "production" ]]; then
            apk="exports/android/popugvpocket-${version}.apk"
            run_godot_export "$GODOT_BIN" --headless --path . --export-release "Android Compact Debug" "$apk"
            run_godot_export "$GODOT_BIN" --headless --path . --export-release "Android Bundle" "exports/android/popugvpocket-${version}.aab"
          else
            apk="exports/android/popugvpocket-${version}-debug.apk"
            run_godot_export "$GODOT_BIN" --headless --path . --export-debug "Android Compact Debug" "$apk"
          fi
          sha256sum exports/android/* > exports/android/SHA256SUMS.txt
      - name: Inspect APK
        run: |
          apk=$(find exports/android -name '*.apk' -print -quit)
          "$ANDROID_HOME/build-tools/35.0.1/aapt" dump badging "$apk" | head -n 3
          python tools/analyze_apk.py "$apk"
      - uses: actions/upload-artifact@v4
        with:
          name: popugvpocket-${{ steps.release.outputs.version }}-${{ steps.release.outputs.mode }}
          path: |
            exports/android/*.apk
            exports/android/*.aab
            exports/android/SHA256SUMS.txt
          retention-days: 14
      - name: Create GitHub Release
        if: github.ref_type == 'tag' || inputs.draft == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.version }}
          body_path: docs/releases/0.5.1.md
          draft: ${{ steps.release.outputs.draft }}
          prerelease: ${{ steps.release.outputs.mode == 'debug-prerelease' || steps.release.outputs.prerelease == 'true' }}
          files: |
            exports/android/*.apk
            exports/android/*.aab
            exports/android/SHA256SUMS.txt
