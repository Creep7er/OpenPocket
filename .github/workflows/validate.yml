name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate project
        run: python tools/validate_project.py
      - name: Package logic checks
        run: python tools/test_package_logic.py
      - name: Validate JSON files
        run: python -m json.tool packages/index.json > /dev/null
